name: Omni CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agent.py'
      - 'adapters/**'
      - 'scripts/**'
      - 'requirements.txt'
      - '.github/workflows/omni-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile check
        run: |
          python -m py_compile agent.py adapters/reticulum_bridge_mock.py
      - name: Run pre-PR checks
        run: |
          bash scripts/omni_prepr_check.sh
