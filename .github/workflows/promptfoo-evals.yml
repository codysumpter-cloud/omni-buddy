name: Promptfoo Evals

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agent.py'
      - 'adapters/**'
      - 'config/**'
      - 'config.json'
      - 'evals/promptfoo/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Run promptfoo eval (if key exists)
        working-directory: evals/promptfoo
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY missing; skipping cloud eval"
            exit 0
          fi
          npx promptfoo@latest eval -c promptfooconfig.yaml
